name: projeto-bd-prod

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_FILTER: DOMAIN
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - front
      - back

  front:
    image: ghcr.io/${GHCR_OWNER}/projeto-bd-front:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"

  back:
    image: ghcr.io/${GHCR_OWNER}/projeto-bd-back:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      ROOT_PATH: /api
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/hospital.sql:/docker-entrypoint-initdb.d/01_hospital.sql:ro
      - ./scripts/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
      - ./scripts/02_grant.sh:/docker-entrypoint-initdb.d/03_grant.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  certbot:
    image: certbot/certbot
    profiles: ["certbot"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  db_data:
  certbot_conf:
  certbot_www:
