server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache dos assets com hash no nome do arquivo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
