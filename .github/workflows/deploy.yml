name: Deploy para a EC2

# Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY. O GITHUB_TOKEN é automático.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-producao
  cancel-in-progress: false

env:
  IMAGE_BACK: ghcr.io/${{ github.repository }}-back
  IMAGE_FRONT: ghcr.io/${{ github.repository }}-front

jobs:
  build:
    name: Build e push das imagens
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Back
        uses: docker/build-push-action@v6
        with:
          context: ./back
          push: true
          tags: |
            ${{ env.IMAGE_BACK }}:${{ github.sha }}
            ${{ env.IMAGE_BACK }}:latest
          cache-from: type=gha,scope=back
          cache-to: type=gha,mode=max,scope=back

      - name: Front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          # O Vite inlina a URL da API no bundle durante o build, então ela não pode
          # ser injetada em runtime. Relativa, quem roteia /api/ é o nginx.
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ env.IMAGE_FRONT }}:${{ github.sha }}
            ${{ env.IMAGE_FRONT }}:latest
          cache-from: type=gha,scope=front
          cache-to: type=gha,mode=max,scope=front

  deploy:
    name: Deploy na EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar a infra para a instância
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml,.env.prod.example,nginx,scripts
          target: /opt/projeto-bd
          overwrite: true

      - name: Subir a stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/projeto-bd

            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            export IMAGE_TAG='${{ github.sha }}'
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            docker compose -f docker-compose.prod.yml ps
